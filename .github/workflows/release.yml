name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to upload artifacts to (draft release recommended for dry runs)"
        required: true
        default: "v0.0.0-test"

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  build-artifacts:
    name: Build & Upload
    needs: release-please
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || needs.release-please.outputs.release_created == 'true')
    runs-on: macos-latest
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python for native modules
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Make distributables
        run: pnpm electron:make

      - name: Upload artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          artifacts=$(find out/make -type f \( -name '*.dmg' -o -name '*.zip' \))
          if [ -z "$artifacts" ]; then
            echo "::error::No artifacts found under out/make/"
            ls -lR out/make || true
            exit 1
          fi
          echo "Uploading to $TAG_NAME:"
          echo "$artifacts"
          find out/make -type f \( -name '*.dmg' -o -name '*.zip' \) -print0 \
            | xargs -0 gh release upload "$TAG_NAME" --clobber
