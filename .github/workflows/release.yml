name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  build-artifacts:
    name: Build & Upload
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Python for native modules
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild native modules
        run: pnpm rebuild better-sqlite3 macos-alias

      - name: Make distributables
        run: pnpm electron:make

      - name: Upload artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for file in out/make/**/*.{dmg,zip}; do
            [ -f "$file" ] && gh release upload "${{ needs.release-please.outputs.tag_name }}" "$file" --clobber
          done
